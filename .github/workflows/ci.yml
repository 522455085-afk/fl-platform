name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Run linter
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_CLOUDBASE_ENV_ID: ${{ secrets.NEXT_PUBLIC_CLOUDBASE_ENV_ID }}
          NEXT_PUBLIC_FOUNDER_IDS: ${{ secrets.NEXT_PUBLIC_FOUNDER_IDS }}
          NEXT_PUBLIC_RUM_APP_ID: ${{ secrets.NEXT_PUBLIC_RUM_APP_ID }}
          NEXT_PUBLIC_RUM_REPORT_URL: ${{ secrets.NEXT_PUBLIC_RUM_REPORT_URL }}
          NEXT_PUBLIC_RUM_SAMPLE_RATE: ${{ secrets.NEXT_PUBLIC_RUM_SAMPLE_RATE }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7

  deploy:
    name: Deploy to EdgeOne Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
          
      # 部署到 EdgeOne Pages
      # 需要在 GitHub Secrets 中配置 EDGEONE_API_TOKEN
      # 参考文档：https://www.tencentcloud.com/document/product/1145
      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_ID: ${{ secrets.EDGEONE_PROJECT_ID }}
        run: |
          echo "Deploying to EdgeOne Pages..."
          # 这里需要安装 EdgeOne CLI 并部署
          # 具体命令请参考 EdgeOne Pages 官方文档
          echo "Please configure EdgeOne Pages deployment in your project"
          
      # 或者部署到 GitHub Pages（备选方案）
      - name: Deploy to GitHub Pages (Fallback)
        if: failure()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
